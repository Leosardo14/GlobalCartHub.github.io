<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GlobalCartHub</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f4f4f4; }
    header { background: #222; color: white; padding: 15px; text-align: center; }
    .container { padding: 20px; }
    .products { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 20px; }
    .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
    .card img { width: 100%; border-radius: 10px; }
    .btn { display: inline-block; margin-top: 10px; padding: 10px; background: green; color: white; text-decoration: none; border-radius: 5px; }
  </style>
</head>
<body>

<header>
  <h1>GlobalCartHub</h1>
  <p>Il tuo shop online</p>
</header>

<div class="container">
  <h2>Prodotti</h2>
  <div class="products">

    <div class="card">
      <img src="https://via.placeholder.com/200" alt="Prodotto">
      <h3>Nome Prodotto</h3>
      <p>€19.99</p>
      <a class="btn" href="https://wa.me/393XXXXXXXXX?text=Voglio%20ordinare%20questo%20prodotto" target="_blank">Ordina su WhatsApp</a>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/200" alt="Prodotto">
      <h3>Altro Prodotto</h3>
      <p>€29.99</p>
      <a class="btn" href="https://wa.me/393XXXXXXXXX?text=Voglio%20ordinare%20questo%20prodotto" target="_blank">Ordina su WhatsApp</a>
    </div>

  </div>
</div>

</body>
</html>
